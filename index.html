<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QR Premium — Support och integritet</title>
  <style>
    :root { --bg:#f5f3ee; --card:#ffffff; --text:#1c1c1c; --muted:#5f5f5f; --accent:#1a5f7a; --border:#e8e2d8; }
    body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background:var(--bg); color:var(--text); }
    .wrap { max-width: 760px; margin: 32px auto; padding: 0 16px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:24px; }
    h1 { margin:0 0 8px; font-size:32px; }
    p { color:var(--muted); line-height:1.6; }
    .links { display:flex; gap:12px; flex-wrap:wrap; margin-top:16px; }
    a.btn { text-decoration:none; background:var(--accent); color:#fff; padding:10px 14px; border-radius:10px; font-weight:600; }
    .small { margin-top:20px; font-size:14px; color:var(--muted); }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>QR Premium</h1>
      <p>Officiell supportsida och integritetssida för iOS-appen <strong>QR Premium</strong> (QR-koder — skapa, anpassa och exportera).</p>
      <div class="links">
        <a class="btn" href="./support.html">Support</a>
        <a class="btn" href="./privacy.html">Integritetspolicy</a>
      </div>
      <p class="small">Byt gärna e-postadress nedan till din publika supportadress innan du länkar från App Store Connect.</p>
    </section>
  </main>
</body>
</html>
